<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Верность | Немое аниме • Серия 1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0a0a12;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 15px;
        }
        .anime-player {
            position: relative;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 30px 50px rgba(0,0,0,0.7), 0 0 0 3px rgba(255,180,80,0.3);
            background: #000;
            max-width: 100%;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            cursor: pointer;
            background: #0f1725;
        }
        .timeline {
            position: absolute;
            bottom: 12px;
            left: 15px;
            right: 15px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 6px 15px;
            display: flex;
            gap: 12px;
            align-items: center;
            font-family: monospace;
            font-weight: bold;
            pointer-events: none;
            border: 1px solid #ffaa6655;
            z-index: 10;
        }
        .time-text {
            color: #ffaa66;
            font-size: 11px;
            min-width: 75px;
            letter-spacing: 1px;
        }
        .progress-bar-bg {
            flex: 1;
            height: 4px;
            background: #2f3e4e;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #ffaa66;
            border-radius: 10px;
            transition: width 0.1s linear;
            box-shadow: 0 0 5px #ffaa66;
        }
        .anime-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            padding: 5px 14px;
            border-radius: 40px;
            color: #ffcc88;
            font-size: 10px;
            font-weight: bold;
            letter-spacing: 2px;
            font-family: monospace;
            border-left: 3px solid #ffaa66;
            pointer-events: none;
            z-index: 10;
        }
        .episode-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            padding: 5px 14px;
            border-radius: 40px;
            color: #ffaa66;
            font-size: 10px;
            font-weight: bold;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
        .subtitle {
            position: absolute;
            bottom: 65px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 12px 20px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            color: #fff9e6;
            font-family: 'Segoe UI', 'Poppins', sans-serif;
            letter-spacing: 0.5px;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 1px 2px black;
            border-left: 3px solid #ffaa66;
            border-right: 3px solid #ffaa66;
        }
        .click-hint {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(0,0,0,0.5);
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 9px;
            color: #aaa;
            pointer-events: none;
            font-family: monospace;
            z-index: 10;
        }
        @media (min-width: 768px) {
            .anime-player { max-width: 950px; }
            .time-text { font-size: 13px; }
            .anime-badge, .episode-badge { font-size: 12px; padding: 6px 18px; }
            .subtitle { font-size: 18px; bottom: 75px; padding: 14px 24px; }
            .click-hint { font-size: 11px; bottom: 20px; }
        }
    </style>
</head>
<body>
<div class="anime-player">
    <canvas id="animeCanvas" width="950" height="580" style="width:100%; height:auto; aspect-ratio:950/580"></canvas>
    <div class="timeline">
        <div class="time-text" id="timeDisplay">00:00 / 07:30</div>
        <div class="progress-bar-bg"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div class="anime-badge">✨ НЕМОЕ АНИМЕ • VERGIL PROD</div>
    <div class="episode-badge">СЕРИЯ 1 • ВСТРЕЧА</div>
    <div class="subtitle" id="subtitleText">...</div>
    <div class="click-hint">⏯ нажми — пауза/продолжить</div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('animeCanvas');
        const ctx = canvas.getContext('2d');
        const subtitleEl = document.getElementById('subtitleText');
        const W = 950, H = 580;
        canvas.width = W;
        canvas.height = H;
        
        let totalSeconds = 450;
        let currentSeconds = 0;
        let running = true;
        let frameId;
        let frame = 0;
        
        const timeDisplay = document.getElementById('timeDisplay');
        const progressFill = document.getElementById('progressFill');
        
        // ========= СЦЕНЫ (с субтитрами) =========
        const scenes = [
            { dur: 40, visual: "night", action: "alex_walk", subtitle: "«В детдоме я понял одно: если не заступишься за себя — никто не заступится.»" },
            { dur: 35, visual: "night", action: "alex_stop", subtitle: "«Но однажды я понял другое: если не заступишься за слабого — ты хуже тех, кто бьёт.»" },
            { dur: 45, visual: "park", action: "vika_cry", subtitle: "«Помогите! Отстаньте от меня! Пожалуйста!»" },
            { dur: 50, visual: "park", action: "alex_fight", subtitle: "«Отойдите от неё.» — «Ты чё, герой?» — «Я тот, кто знает, каково это — когда никто не приходит.»" },
            { dur: 40, visual: "park", action: "hit", subtitle: "Удар. Падение. Кровь. Но он встаёт." },
            { dur: 35, visual: "park", action: "vika_run", subtitle: "«Беги!» Девушка убегает." },
            { dur: 50, visual: "bench", action: "meet", subtitle: "Через неделю. Та же скамейка. «Меня зовут Вика. Ты спас мне жизнь.»" },
            { dur: 60, visual: "bench", action: "alex_speech", subtitle: "«Потому что я поклялся: если услышу чужой крик — приду. Даже если убьют. Лучше умереть стоя, чем жить на коленях.»" },
            { dur: 55, visual: "sunset", action: "spark", subtitle: "«Ты — блистатель океана мирового уровня на всей планете. Ты — моё спасение.»" },
            { dur: 40, visual: "sunset", action: "final", subtitle: "Конец первой серии. Продолжение следует..." }
        ];
        
        let totalSceneDur = 0;
        scenes.forEach(s => totalSceneDur += s.dur);
        if(Math.abs(totalSceneDur - totalSeconds) > 10) totalSeconds = totalSceneDur;
        
        function getCurrentScene(sec){
            let acc = 0;
            for(let i=0; i<scenes.length; i++){
                if(sec >= acc && sec < acc + scenes[i].dur) return scenes[i];
                acc += scenes[i].dur;
            }
            return scenes[scenes.length-1];
        }
        
        // ========= АНИМАЦИЯ ПЕРСОНАЖЕЙ =========
        let alex = { x: 320, y: 420, eyeBlink: 0, walkCycle: 0 };
        let vika = { x: 550, y: 415, eyeBlink: 0 };
        let drunk = [{x:680,y:420},{x:730,y:425},{x:780,y:418}];
        
        // Сакура
        let sakura = [];
        for(let i=0;i<50;i++){
            sakura.push({ x: Math.random()*W, y: Math.random()*H, speed: 0.8+Math.random()*2.5 });
        }
        
        // ========= ОТРИСОВКИ ФОНОВ =========
        function drawNight(){
            const grad = ctx.createLinearGradient(0,0,0,H);
            grad.addColorStop(0,"#0a0f2a");
            grad.addColorStop(1,"#1a2a3e");
            ctx.fillStyle=grad;
            ctx.fillRect(0,0,W,H);
            // Звёзды
            for(let i=0;i<120;i++){
                let twinkle = Math.sin(frame*0.02 + i)*0.5+0.5;
                ctx.fillStyle = `rgba(255,240,200,${0.2+twinkle*0.5})`;
                ctx.beginPath();
                ctx.arc(30+Math.sin(i)*W*0.2, 30+Math.random()*180, 1.2, 0, Math.PI*2);
                ctx.fill();
            }
            // Луна
            ctx.fillStyle="#ffeecc";
            ctx.shadowBlur=25;
            ctx.beginPath();
            ctx.arc(780,80,48,0,Math.PI*2);
            ctx.fill();
            ctx.shadowBlur=0;
            // Фонари
            for(let i=0;i<3;i++){
                ctx.fillStyle="#ffcc88";
                ctx.fillRect(150+i*280,320,5,70);
                ctx.beginPath();
                ctx.arc(152.5+i*280,315,14,0,Math.PI*2);
                ctx.fill();
                ctx.fillStyle="rgba(255,200,100,0.2)";
                ctx.beginPath();
                ctx.arc(152.5+i*280,315,30,0,Math.PI*2);
                ctx.fill();
            }
        }
        
        function drawPark(){
            drawNight();
            ctx.fillStyle="#2a5a3a";
            ctx.fillRect(0,370,W,210);
            ctx.fillStyle="#5a4a2a";
            ctx.fillRect(0,390,W,15);
            for(let i=0;i<4;i++){
                ctx.fillStyle="#3a2a1a";
                ctx.fillRect(100+i*200,320,15,100);
                ctx.fillStyle="#4a7a4a";
                ctx.beginPath();
                ctx.ellipse(107+i*200,300,35,45,0,0,Math.PI*2);
                ctx.fill();
            }
        }
        
        function drawBench(){
            drawPark();
            ctx.fillStyle="#8b6946";
            ctx.fillRect(380,440,200,18);
            ctx.fillStyle="#a57c52";
            ctx.fillRect(400,410,160,30);
            ctx.fillStyle="#c49a6c";
            for(let i=0;i<3;i++) ctx.fillRect(410+i*45,435,8,8);
        }
        
        function drawSunset(){
            const grad=ctx.createLinearGradient(0,0,0,H);
            grad.addColorStop(0,"#7a2c3a");
            grad.addColorStop(1,"#e69a5a");
            ctx.fillStyle=grad;
            ctx.fillRect(0,0,W,H);
            ctx.fillStyle="#ffdd99";
            ctx.shadowBlur=40;
            ctx.beginPath();
            ctx.arc(W-120,140,65,0,Math.PI*2);
            ctx.fill();
            ctx.shadowBlur=0;
            ctx.fillStyle="#2a4a2a";
            ctx.fillRect(0,400,W,180);
        }
        
        // Персонажи
        function drawAlex(x,y){
            let eyeOpen = (alex.eyeBlink % 60 < 5) ? 2 : 6;
            let bodySway = Math.sin(frame*0.05) * 1.5;
            ctx.save();
            ctx.translate(x, y+bodySway);
            ctx.fillStyle="#2a2a3a";
            ctx.beginPath();
            ctx.ellipse(0, -28, 20, 14, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle="#f5dbb1";
            ctx.beginPath();
            ctx.ellipse(0, -18, 18, 22, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle="#1a2a3a";
            ctx.beginPath();
            ctx.ellipse(-8, -22, 4, eyeOpen, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(8, -22, 4, eyeOpen, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle="white";
            ctx.beginPath();
            ctx.arc(-10, -24, 1.2, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(6, -24, 1.2, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle="#4a5a6a";
            ctx.fillRect(-16, -8, 32, 42);
            ctx.fillStyle="#cc4444";
            ctx.fillRect(-14, -4, 28, 10);
            ctx.restore();
        }
        
        function drawVika(x,y){
            let eyeOpen = (vika.eyeBlink % 70 < 5) ? 2 : 6;
            ctx.save();
            ctx.translate(x, y);
            ctx.fillStyle="#4a2a2a";
            ctx.beginPath();
            ctx.ellipse(0, -26, 18, 22, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle="#f5dbb1";
            ctx.beginPath();
            ctx.ellipse(0, -16, 16, 20, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle="#1a2a3a";
            ctx.beginPath();
            ctx.ellipse(-6, -20, 3.5, eyeOpen, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(6, -20, 3.5, eyeOpen, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle="white";
            ctx.beginPath();
            ctx.arc(-7.5, -22, 1.2, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(4.5, -22, 1.2, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle="#d48a8a";
            ctx.fillRect(-12, -6, 24, 38);
            ctx.restore();
        }
        
        function drawDrunk(x,y){
            ctx.fillStyle="#6a4a3a";
            ctx.beginPath();
            ctx.ellipse(x, y-15, 12, 16, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle="#4a2a1a";
            ctx.fillRect(x-10, y-5, 20, 30);
            ctx.fillStyle="#aa5555";
            ctx.beginPath();
            ctx.arc(x-3, y-20, 3, 0, Math.PI*2);
            ctx.fill();
        }
        
        function drawSakura(){
            for(let s of sakura){
                ctx.fillStyle=`rgba(255,180,200,${0.4+Math.sin(frame*0.02)*0.3})`;
                ctx.beginPath();
                ctx.moveTo(s.x, s.y);
                ctx.lineTo(s.x-3, s.y+5);
                ctx.lineTo(s.x+3, s.y+5);
                ctx.fill();
                s.y += s.speed;
                if(s.y > H) s.y = 0;
            }
        }
        
        function drawByVisual(vis, action){
            if(vis === "night") drawNight();
            else if(vis === "park") drawPark();
            else if(vis === "bench") drawBench();
            else if(vis === "sunset") drawSunset();
            else drawNight();
            
            drawSakura();
            
            if(action === "alex_walk"){ alex.x = 200 + Math.sin(frame*0.03)*10; drawAlex(alex.x, alex.y); }
            else if(action === "alex_stop"){ drawAlex(320, alex.y); }
            else if(action === "vika_cry"){ drawAlex(350, alex.y); drawVika(550, vika.y); for(let d of drunk) drawDrunk(d.x, d.y); }
            else if(action === "alex_fight"){ drawAlex(400, alex.y); for(let d of drunk) drawDrunk(d.x-20, d.y); }
            else if(action === "hit"){ drawAlex(400, alex.y+15); for(let d of drunk) drawDrunk(d.x-30, d.y); }
            else if(action === "vika_run"){ drawAlex(400, alex.y); drawVika(650, vika.y-10); }
            else if(action === "meet"){ drawAlex(350, alex.y); drawVika(520, vika.y); }
            else if(action === "alex_speech"){ drawAlex(340, alex.y); drawVika(540, vika.y); }
            else if(action === "spark"){ drawAlex(340, alex.y); drawVika(540, vika.y); 
                for(let i=0;i<15;i++){ ctx.fillStyle="#ffaa66"; ctx.beginPath(); ctx.arc(440+Math.sin(i)*20, 380, 3, 0, Math.PI*2); ctx.fill(); }
            }
            else if(action === "final"){ drawAlex(340, alex.y); drawVika(540, vika.y); }
            else { drawAlex(320, alex.y); }
        }
        
        let lastSubtitle = "";
        
        function animate(){
            if(!running){ frameId = requestAnimationFrame(animate); return; }
            currentSeconds += 1/30;
            if(currentSeconds >= totalSeconds){ currentSeconds = totalSeconds; running = false; }
            let perc = (currentSeconds/totalSeconds)*100;
            progressFill.style.width = perc+"%";
            let mins = Math.floor(currentSeconds/60);
            let secs = Math.floor(currentSeconds%60);
            let totalMins = Math.floor(totalSeconds/60);
            let totalSecsDisplay = Math.floor(totalSeconds%60);
            timeDisplay.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')} / ${totalMins.toString().padStart(2,'0')}:${totalSecsDisplay.toString().padStart(2,'0')}`;
            
            const scene = getCurrentScene(currentSeconds);
            ctx.clearRect(0,0,W,H);
            drawByVisual(scene.visual, scene.action);
            
            if(scene.subtitle !== lastSubtitle){
                subtitleEl.style.opacity = "0";
                setTimeout(() => {
                    subtitleEl.innerText = scene.subtitle;
                    subtitleEl.style.opacity = "1";
                }, 100);
                lastSubtitle = scene.subtitle;
            }
            
            alex.eyeBlink++;
            vika.eyeBlink++;
            frame++;
            
            frameId = requestAnimationFrame(animate);
        }
        
        canvas.addEventListener('click', () => {
            running = !running;
            if(!running) cancelAnimationFrame(frameId);
            else animate();
        });
        
        subtitleEl.innerText = scenes[0].subtitle;
        animate();
    })();
</script>
</body>
</html>
